name: CI

on:
  push:
    branches: [main, tranche-2-sdk]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · fmt · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: gofmt (fail on unformatted files)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (incl. examples)
        run: go build ./...

      - name: Test (race + coverage)
        run: go test ./... -race -cover

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
